<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>App Configuration Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1754cf",
                        // Mapped "Champagne Linen" to a very light, warm off-white that fits the "background-light" slot concept
                        "background-light": "#F5F3EF", 
                        "background-dark": "#111621",
                        // Mapped "Charcoal Bark" to a deep warm grey
                        "charcoal": "#2C2C2C",
                        "charcoal-light": "#595959",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom toggle switch styling to match primary color */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #1754cf;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #1754cf;
        }
        
        /* Hide scrollbar for clean look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-charcoal dark:text-gray-100 font-display min-h-screen antialiased selection:bg-primary/20">
<div class="max-w-md mx-auto min-h-screen flex flex-col relative overflow-hidden bg-background-light dark:bg-background-dark shadow-2xl">
<!-- Status Bar Placeholder (iOS Style) -->
<div class="px-6 pt-5 pb-2 flex justify-between items-center text-xs font-medium text-charcoal dark:text-white z-10">
<span>9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-icons text-[16px]">signal_cellular_alt</span>
<span class="material-icons text-[16px]">wifi</span>
<span class="material-icons text-[16px]">battery_full</span>
</div>
</div>
<!-- Header Navigation -->
<header class="px-6 pt-4 pb-8 flex items-center justify-between z-10">
<button class="p-2 -ml-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-icons text-charcoal dark:text-white text-2xl">arrow_back</span>
</button>
<h1 class="text-lg font-medium tracking-wide text-charcoal dark:text-white uppercase opacity-0">Settings</h1> <!-- Hidden title for balance -->
<button class="p-2 -mr-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors text-sm font-medium text-charcoal-light dark:text-gray-400">
                Done
            </button>
</header>
<!-- Main Title -->
<div class="px-6 mb-8">
<h1 class="text-3xl font-light text-charcoal dark:text-white tracking-tight">Settings</h1>
<p class="text-sm text-charcoal-light dark:text-gray-400 mt-2 font-light">Configure your gallery experience.</p>
</div>
<!-- Content Area -->
<main class="flex-1 overflow-y-auto no-scrollbar pb-10 px-6">
<!-- Preferences Section -->
<section class="mb-10">
<h2 class="text-xs font-semibold text-charcoal-light/70 dark:text-gray-500 uppercase tracking-widest mb-4 ml-1">Preferences</h2>
<div class="bg-white/60 dark:bg-white/5 backdrop-blur-sm rounded-xl overflow-hidden shadow-sm border border-white/40 dark:border-white/10">
<!-- Dark Mode Toggle -->
<div class="flex items-center justify-between p-4 border-b border-black/5 dark:border-white/10 group active:bg-white/80 transition-colors cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full bg-charcoal/5 dark:bg-white/10 flex items-center justify-center text-charcoal dark:text-white">
<span class="material-icons text-lg">dark_mode</span>
</div>
<span class="text-base font-normal text-charcoal dark:text-gray-200">Dark Mode</span>
</div>
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-background-light appearance-none cursor-pointer z-10 transition-all duration-300 left-0 checked:left-6" id="toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 dark:bg-gray-600 cursor-pointer transition-colors duration-300" for="toggle"></label>
</div>
</div>
<!-- Language Row -->
<button class="w-full flex items-center justify-between p-4 border-b border-black/5 dark:border-white/10 hover:bg-white/80 dark:hover:bg-white/10 transition-colors group text-left">
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full bg-charcoal/5 dark:bg-white/10 flex items-center justify-center text-charcoal dark:text-white">
<span class="material-icons text-lg">language</span>
</div>
<span class="text-base font-normal text-charcoal dark:text-gray-200">Language</span>
</div>
<div class="flex items-center gap-2">
<span class="text-primary font-medium text-sm">English</span>
<span class="material-icons text-gray-400 text-lg group-hover:translate-x-1 transition-transform">chevron_right</span>
</div>
</button>
<!-- Currency Row -->
<button class="w-full flex items-center justify-between p-4 hover:bg-white/80 dark:hover:bg-white/10 transition-colors group text-left">
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full bg-charcoal/5 dark:bg-white/10 flex items-center justify-center text-charcoal dark:text-white">
<span class="material-icons text-lg">payments</span>
</div>
<span class="text-base font-normal text-charcoal dark:text-gray-200">Currency</span>
</div>
<div class="flex items-center gap-2">
<span class="text-primary font-medium text-sm">USD ($)</span>
<span class="material-icons text-gray-400 text-lg group-hover:translate-x-1 transition-transform">chevron_right</span>
</div>
</button>
</div>
</section>
<!-- Legal Section -->
<section class="mb-10">
<h2 class="text-xs font-semibold text-charcoal-light/70 dark:text-gray-500 uppercase tracking-widest mb-4 ml-1">Legal</h2>
<div class="bg-white/60 dark:bg-white/5 backdrop-blur-sm rounded-xl overflow-hidden shadow-sm border border-white/40 dark:border-white/10">
<!-- Privacy Policy -->
<button class="w-full flex items-center justify-between p-4 border-b border-black/5 dark:border-white/10 hover:bg-white/80 dark:hover:bg-white/10 transition-colors group text-left">
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full bg-charcoal/5 dark:bg-white/10 flex items-center justify-center text-charcoal dark:text-white">
<span class="material-icons text-lg">privacy_tip</span>
</div>
<span class="text-base font-normal text-charcoal dark:text-gray-200">Privacy Policy</span>
</div>
<span class="material-icons text-gray-400 text-lg group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<!-- Terms of Service -->
<button class="w-full flex items-center justify-between p-4 hover:bg-white/80 dark:hover:bg-white/10 transition-colors group text-left">
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full bg-charcoal/5 dark:bg-white/10 flex items-center justify-center text-charcoal dark:text-white">
<span class="material-icons text-lg">gavel</span>
</div>
<span class="text-base font-normal text-charcoal dark:text-gray-200">Terms of Service</span>
</div>
<span class="material-icons text-gray-400 text-lg group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
</div>
</section>
<!-- Support Section (Bonus from plan) -->
<section class="mb-8">
<h2 class="text-xs font-semibold text-charcoal-light/70 dark:text-gray-500 uppercase tracking-widest mb-4 ml-1">Support</h2>
<div class="bg-white/60 dark:bg-white/5 backdrop-blur-sm rounded-xl overflow-hidden shadow-sm border border-white/40 dark:border-white/10">
<button class="w-full flex items-center justify-between p-4 hover:bg-white/80 dark:hover:bg-white/10 transition-colors group text-left">
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full bg-charcoal/5 dark:bg-white/10 flex items-center justify-center text-charcoal dark:text-white">
<span class="material-icons text-lg">help_outline</span>
</div>
<span class="text-base font-normal text-charcoal dark:text-gray-200">Help Center</span>
</div>
<span class="material-icons text-gray-400 text-lg group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
</div>
</section>
<!-- Decorative Editorial Element -->
<div class="my-8 relative h-32 rounded-xl overflow-hidden group">
<img alt="Linen Texture" class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform duration-700 ease-out" data-alt="Abstract macro shot of linen fabric texture in soft beige light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBpA2Hst2auDmaRmAJm1zx6EcYy1W2S1SoUbCFvDgQnjCQsF-rOKu0s-rf93r1iHnT8NQm_UYfBRWVkH3TL_aU2P3kmZZfLDEC8K_UpXMchEP9QVYuyMleSzhqq9IYFVLXd5QUoN-zAUVVCRm6q6jV0zztK1XIhfvBtcQy9iP4Y1n-XXyK5a_l1ufsJW_ZBwuIEenl3ggs8r42Lk97N0TegTaPKbeqc8_SXSNpxTYR8ajsLWKGpHGTJOhMHQL5rcloRFu8VHIbGoc-L"/>
<div class="absolute inset-0 bg-gradient-to-r from-background-light/90 via-background-light/40 to-transparent dark:from-background-dark/90 dark:via-background-dark/40 mix-blend-multiply"></div>
<div class="relative h-full flex flex-col justify-center p-6">
<h3 class="font-display font-light text-xl text-charcoal dark:text-white mb-1">The Annual Collection</h3>
<p class="text-xs text-charcoal-light dark:text-gray-300 mb-3 max-w-[60%]">Explore the new arrivals in our digital showroom.</p>
<span class="text-xs font-medium text-primary uppercase tracking-widest flex items-center gap-1">
                        View Lookbook <span class="material-icons text-[14px]">arrow_forward</span>
</span>
</div>
</div>
<!-- Footer Version Info -->
<div class="text-center pb-8 pt-4">
<p class="text-xs font-medium text-charcoal/40 dark:text-gray-600 uppercase tracking-widest">Luxe Gallery App</p>
<p class="text-[10px] text-charcoal/30 dark:text-gray-700 mt-1 font-mono">v2.4.0 build 1024</p>
</div>
</main>
</div>
</body></html>
