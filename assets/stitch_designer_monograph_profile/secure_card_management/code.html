<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Secure Card Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Playfair+Display:ital,wght@0,600;1,600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1754cf",
                        "primary-dark": "#0f3da1",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                        "charcoal": "#1e293b", // Charcoal Bark interpretation
                        "sage-mist": "#9caeb3", // Sage Mist interpretation
                        "sage-mist-light": "#e3e9eb",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "serif": ["Playfair Display", "serif"], // Added for magazine headings
                        "mono": ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "Liberation Mono", "Courier New", "monospace"],
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'card': '0 10px 40px -10px rgba(23, 84, 207, 0.25)',
                    }
                },
            },
        }
    </script>
<style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .dark .glass-effect {
            background: rgba(17, 22, 33, 0.85);
        }
        
        /* Custom Switch Styling for Sage Mist toggle */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #1754cf;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #1754cf;
        }
        
        .card-shiny {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen text-charcoal dark:text-gray-100 antialiased selection:bg-primary/20 selection:text-primary">
<!-- Mobile Container -->
<div class="max-w-md mx-auto min-h-screen flex flex-col relative bg-white dark:bg-background-dark shadow-2xl overflow-hidden">
<!-- Header -->
<header class="pt-12 pb-4 px-6 flex items-center justify-between sticky top-0 z-10 glass-effect border-b border-primary/5 dark:border-white/5">
<button class="text-charcoal dark:text-white hover:text-primary transition-colors p-2 -ml-2 rounded-full hover:bg-primary/5">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-sm font-semibold tracking-widest uppercase text-charcoal dark:text-white/90">Add New Card</h1>
<button class="text-charcoal dark:text-white hover:text-primary transition-colors p-2 -mr-2 rounded-full hover:bg-primary/5">
<span class="material-symbols-outlined text-2xl">qr_code_scanner</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto px-6 py-8">
<!-- Section Header -->
<div class="mb-8 text-center">
<h2 class="font-serif text-3xl italic text-primary dark:text-white mb-2">Payment Details</h2>
<p class="text-xs font-medium tracking-wide text-gray-400 uppercase">Secure Transaction</p>
</div>
<!-- Dynamic Card Preview -->
<div class="relative w-full aspect-[1.58/1] mb-10 transform transition-transform hover:scale-[1.02] duration-300 perspective-1000">
<div class="absolute inset-0 rounded-2xl bg-gradient-to-br from-primary to-primary-dark shadow-card overflow-hidden text-white p-6 flex flex-col justify-between">
<!-- Abstract Pattern Background -->
<div class="absolute inset-0 opacity-20 pointer-events-none">
<div class="absolute -right-10 -top-10 w-40 h-40 rounded-full bg-white blur-3xl"></div>
<div class="absolute -left-10 bottom-0 w-32 h-32 rounded-full bg-purple-500 blur-3xl"></div>
<!-- SVG Pattern for texture -->
<svg height="100%" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
<pattern height="20" id="grid" patternunits="userSpaceOnUse" width="20">
<circle cx="2" cy="2" fill="white" fill-opacity="0.2" r="1"></circle>
</pattern>
</defs>
<rect fill="url(#grid)" height="100%" width="100%"></rect>
</svg>
</div>
<div class="relative z-10 flex justify-between items-start">
<!-- Chip -->
<div class="w-10 h-8 bg-yellow-100/20 rounded border border-yellow-200/30 flex items-center justify-center overflow-hidden">
<div class="w-full h-[1px] bg-yellow-200/40 mb-1"></div>
<div class="absolute w-[1px] h-full bg-yellow-200/40 left-1/3"></div>
<div class="absolute w-[1px] h-full bg-yellow-200/40 right-1/3"></div>
</div>
<!-- Contactless Icon -->
<span class="material-symbols-outlined text-white/80" style="font-size: 20px;">contactless</span>
</div>
<div class="relative z-10 space-y-6">
<div class="font-mono text-xl sm:text-2xl tracking-widest drop-shadow-md">
                            4254 •••• •••• 1234
                        </div>
<div class="flex justify-between items-end">
<div>
<p class="text-[0.6rem] font-medium text-white/60 tracking-wider uppercase mb-1">Card Holder</p>
<p class="font-display font-medium text-sm tracking-wide uppercase truncate max-w-[150px]">Isabella Rossi</p>
</div>
<div class="text-right">
<p class="text-[0.6rem] font-medium text-white/60 tracking-wider uppercase mb-1">Expires</p>
<p class="font-mono text-sm tracking-wide">12/26</p>
</div>
</div>
</div>
<!-- Visa Logo Overlay -->
<div class="absolute bottom-6 right-6 z-0 opacity-20">
<span class="text-6xl font-black italic">VISA</span>
</div>
</div>
</div>
<!-- Form Fields -->
<form class="space-y-6" onsubmit="event.preventDefault()">
<!-- Card Number Input -->
<div class="group relative">
<label class="block text-[0.65rem] font-bold tracking-[0.15em] text-gray-500 uppercase mb-2 group-focus-within:text-primary transition-colors" for="cardNumber">Card Number</label>
<div class="relative">
<input class="block w-full border-0 border-b border-gray-200 dark:border-gray-700 bg-transparent py-3 px-0 text-charcoal dark:text-white placeholder:text-gray-300 focus:border-primary focus:ring-0 sm:text-lg font-mono tracking-wide transition-colors" id="cardNumber" placeholder="0000 0000 0000 0000" type="text"/>
<div class="absolute right-0 top-3 text-gray-400 pointer-events-none">
<span class="material-symbols-outlined text-xl">credit_card</span>
</div>
</div>
</div>
<!-- Cardholder Name Input -->
<div class="group">
<label class="block text-[0.65rem] font-bold tracking-[0.15em] text-gray-500 uppercase mb-2 group-focus-within:text-primary transition-colors" for="cardName">Name on Card</label>
<input class="block w-full border-0 border-b border-gray-200 dark:border-gray-700 bg-transparent py-3 px-0 text-charcoal dark:text-white placeholder:text-gray-300 focus:border-primary focus:ring-0 sm:text-lg transition-colors" id="cardName" placeholder="e.g. Isabella Rossi" type="text"/>
</div>
<!-- Split Row: Expiry & CVV -->
<div class="grid grid-cols-2 gap-8">
<div class="group">
<label class="block text-[0.65rem] font-bold tracking-[0.15em] text-gray-500 uppercase mb-2 group-focus-within:text-primary transition-colors" for="expiry">Expiry Date</label>
<input class="block w-full border-0 border-b border-gray-200 dark:border-gray-700 bg-transparent py-3 px-0 text-charcoal dark:text-white placeholder:text-gray-300 focus:border-primary focus:ring-0 sm:text-lg font-mono text-center transition-colors" id="expiry" placeholder="MM / YY" type="text"/>
</div>
<div class="group relative">
<label class="block text-[0.65rem] font-bold tracking-[0.15em] text-gray-500 uppercase mb-2 group-focus-within:text-primary transition-colors flex items-center gap-1" for="cvv">
                            Security Code
                            <span class="material-symbols-outlined text-[10px] text-gray-400 cursor-help" title="3 digits on back of card">help</span>
</label>
<input class="block w-full border-0 border-b border-gray-200 dark:border-gray-700 bg-transparent py-3 px-0 text-charcoal dark:text-white placeholder:text-gray-300 focus:border-primary focus:ring-0 sm:text-lg font-mono text-center transition-colors" id="cvv" maxlength="3" placeholder="123" type="password"/>
<div class="absolute right-0 top-9 text-gray-400 pointer-events-none">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
</div>
</div>
<!-- Save Card Toggle -->
<div class="pt-6 flex items-center justify-between group cursor-pointer">
<div class="flex-1 pr-4">
<h3 class="text-sm font-semibold text-charcoal dark:text-white">Save for future</h3>
<p class="text-xs text-gray-500 mt-1">Securely save this payment method for faster checkout.</p>
</div>
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-gray-200 appearance-none cursor-pointer transition-all duration-300 ease-in-out" id="toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-200 cursor-pointer transition-colors duration-300 peer-checked:bg-primary" for="toggle"></label>
</div>
<!-- Override default toggle styles with inline JS logic simulation via CSS -->
<style>
                        #toggle:checked {
                            right: 0;
                            border-color: #1754cf;
                        }
                        #toggle:checked + .toggle-label {
                            background-color: #1754cf;
                        }
                    </style>
</div>
</form>
</main>
<!-- Footer Actions -->
<footer class="p-6 bg-white dark:bg-background-dark border-t border-gray-100 dark:border-white/5 pb-8">
<button class="w-full bg-primary hover:bg-primary-dark text-white font-medium py-4 px-6 rounded-lg shadow-lg shadow-primary/30 transition-all active:scale-[0.98] flex items-center justify-center gap-2 group">
<span class="material-symbols-outlined text-xl group-hover:animate-pulse">shield_lock</span>
                Add Card Securely
            </button>
<div class="mt-4 flex justify-center items-center gap-2 text-[10px] text-gray-400 uppercase tracking-widest">
<span class="material-symbols-outlined text-sm">lock</span>
                128-BIT SSL ENCRYPTED
            </div>
</footer>
</div>
</body></html>
