<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bespoke Member Signup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Playfair+Display:ital,wght@0,400;0,600;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#17cf17",
                        "background-light": "#F9F7F2", // Champagne Linen interpretation
                        "background-dark": "#112111", // Deep Forest
                        "forest-dark": "#1a3c28",
                        "forest-medium": "#2d5a3f",
                        "linen-dark": "#e8e4dc",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "serif": ["Playfair Display", "serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    backgroundImage: {
                        'linen-texture': "url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjRjlGN0YyIi8+CjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9IiMwMDAiIG9wYWNpdHk9IjAuMDIiLz4KPC9zdmc+')",
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for clean mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Subtle fade-in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }
        .delay-300 { animation-delay: 0.3s; }

        /* Custom checkbox style */
        .checkbox-wrapper input:checked + div {
            background-color: #17cf17;
            border-color: #17cf17;
        }
        .checkbox-wrapper input:checked + div svg {
            display: block;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-gray-800 dark:text-gray-100 font-display antialiased min-h-screen relative overflow-hidden">
<!-- Background Texture Overlay -->
<div class="absolute inset-0 opacity-40 pointer-events-none bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjRjlGN0YyIi8+CjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9IiMwMDAiIG9wYWNpdHk9IjAuMDIiLz4KPC9zdmc+')] mix-blend-multiply dark:mix-blend-overlay"></div>
<!-- Main Content Container (Phone Frame) -->
<div class="relative z-10 max-w-md mx-auto h-screen flex flex-col px-8 py-6 justify-between">
<!-- Header Section -->
<div class="flex-none pt-8 animate-fade-in">
<div class="flex justify-center mb-8">
<!-- Abstract Logo -->
<div class="w-12 h-12 rounded-xl bg-forest-dark flex items-center justify-center shadow-lg transform rotate-45 overflow-hidden">
<div class="w-8 h-8 border border-primary/40 rounded-full"></div>
</div>
</div>
<div class="text-center space-y-2">
<h1 class="font-serif text-4xl text-gray-900 dark:text-white tracking-tight">Join the Community</h1>
<p class="text-gray-500 dark:text-gray-400 font-light text-sm tracking-wide">Curate your personal digital gallery.</p>
</div>
</div>
<!-- Form Section -->
<div class="flex-grow flex flex-col justify-center space-y-6 animate-fade-in delay-100">
<!-- Name Field -->
<div class="group">
<label class="block text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2 ml-1" for="name">Full Name</label>
<div class="relative">
<input class="block w-full px-4 py-3.5 bg-white dark:bg-forest-dark/30 border border-gray-200 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-300 dark:placeholder-gray-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-300 shadow-sm" id="name" placeholder="e.g. Eleanor Rigby" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="group">
<label class="block text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2 ml-1" for="email">Email Address</label>
<div class="relative">
<input class="block w-full px-4 py-3.5 bg-white dark:bg-forest-dark/30 border border-gray-200 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-300 dark:placeholder-gray-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-300 shadow-sm" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field with Strength Meter -->
<div class="group">
<label class="block text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2 ml-1" for="password">Create Password</label>
<div class="relative mb-3">
<input class="block w-full px-4 py-3.5 bg-white dark:bg-forest-dark/30 border border-gray-200 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white placeholder-gray-300 dark:placeholder-gray-600 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-300 shadow-sm" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
<span class="material-icons text-xl">visibility_off</span>
</button>
</div>
<!-- Forest Manor Password Strength Bar -->
<div class="flex gap-1.5 h-1.5 w-full px-1">
<div class="h-full w-1/4 rounded-full bg-forest-medium"></div> <!-- Weak -->
<div class="h-full w-1/4 rounded-full bg-forest-medium/40"></div> <!-- Fair -->
<div class="h-full w-1/4 rounded-full bg-gray-200 dark:bg-gray-700"></div> <!-- Good -->
<div class="h-full w-1/4 rounded-full bg-gray-200 dark:bg-gray-700"></div> <!-- Strong -->
</div>
<div class="flex justify-between px-1 mt-1.5">
<span class="text-[10px] text-forest-medium font-medium">Weak</span>
<span class="text-[10px] text-gray-400">Must contain 8+ characters</span>
</div>
</div>
<!-- Terms Checkboxes -->
<div class="space-y-4 pt-2">
<label class="flex items-start cursor-pointer checkbox-wrapper group">
<input class="sr-only peer" type="checkbox"/>
<div class="w-5 h-5 mt-0.5 border border-gray-300 dark:border-gray-600 rounded flex items-center justify-center transition-colors bg-white dark:bg-transparent group-hover:border-forest-medium">
<svg class="w-3 h-3 text-white hidden" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path></svg>
</div>
<span class="ml-3 text-sm text-gray-600 dark:text-gray-300 font-light leading-snug">
                        I agree to the <a class="text-forest-dark dark:text-primary underline decoration-1 underline-offset-2" href="#">Terms of Service</a> and <a class="text-forest-dark dark:text-primary underline decoration-1 underline-offset-2" href="#">Privacy Policy</a>.
                    </span>
</label>
<label class="flex items-start cursor-pointer checkbox-wrapper group">
<input class="sr-only peer" type="checkbox"/>
<div class="w-5 h-5 mt-0.5 border border-gray-300 dark:border-gray-600 rounded flex items-center justify-center transition-colors bg-white dark:bg-transparent group-hover:border-forest-medium">
<svg class="w-3 h-3 text-white hidden" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path></svg>
</div>
<span class="ml-3 text-sm text-gray-600 dark:text-gray-300 font-light leading-snug">
                        Subscribe to the Bespoke newsletter for curated collections.
                    </span>
</label>
</div>
</div>
<!-- Footer / Actions -->
<div class="flex-none pb-4 pt-8 animate-fade-in delay-200 space-y-6">
<button class="w-full bg-gray-900 dark:bg-primary text-white dark:text-gray-900 py-4 rounded-lg font-medium text-sm tracking-wide shadow-xl hover:shadow-2xl hover:scale-[1.01] transition-all duration-300 relative overflow-hidden group">
<span class="relative z-10">Create Account</span>
<!-- Subtle sheen effect on hover -->
<div class="absolute inset-0 h-full w-full bg-white/10 transform -skew-x-12 -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
</button>
<p class="text-center text-sm text-gray-500 dark:text-gray-400">
                Already a member? <a class="text-forest-dark dark:text-primary font-medium hover:underline decoration-1 underline-offset-4 transition-colors" href="#">Log In</a>
</p>
</div>
</div>
<!-- Decorative Image Element - Abstract furniture hint -->
<div class="fixed bottom-0 left-0 w-full h-1/3 z-0 pointer-events-none opacity-5 dark:opacity-10" style="background: radial-gradient(circle at 50% 100%, rgba(23, 207, 23, 0.15) 0%, transparent 70%);">
</div>
</body></html>
