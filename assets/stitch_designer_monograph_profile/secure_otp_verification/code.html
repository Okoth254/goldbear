<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Secure OTP Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e6a219",
                        "primary-hover": "#cf9117",
                        "background-light": "#f8f7f6",
                        "background-dark": "#211c11",
                        "surface-light": "#ffffff",
                        "surface-dark": "#2c2619",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .pin-input:focus {
            box-shadow: 0 0 0 2px rgba(230, 162, 25, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-gray-900 dark:text-gray-100 min-h-screen flex flex-col antialiased selection:bg-primary/30">
<!-- Status Bar Area (Simulated for iOS context) -->
<div class="h-12 w-full flex items-center justify-between px-6 pt-2 z-20">
<span class="text-sm font-semibold dark:text-white">9:41</span>
<div class="flex gap-2 text-sm dark:text-white">
<span class="material-icons-outlined text-sm">signal_cellular_alt</span>
<span class="material-icons-outlined text-sm">wifi</span>
<span class="material-icons-outlined text-sm">battery_full</span>
</div>
</div>
<!-- Header Navigation -->
<header class="px-6 py-4 flex items-center justify-between z-10">
<button class="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-white/10 transition-colors text-gray-500 dark:text-gray-400">
<span class="material-icons-outlined">chevron_left</span>
</button>
<div class="text-sm font-medium tracking-wide uppercase text-gray-400 dark:text-gray-500">Security</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-8 relative overflow-hidden">
<!-- Decorative Background Element (Abstract 'Gallery' shape) -->
<div class="absolute -top-20 -right-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute top-40 -left-20 w-48 h-48 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
<div class="flex-1 flex flex-col items-center pt-8 pb-4">
<!-- Icon/Logo Area -->
<div class="w-16 h-16 rounded-2xl bg-primary/10 flex items-center justify-center mb-8 ring-1 ring-primary/20 shadow-sm">
<span class="material-icons-outlined text-3xl text-primary">lock_person</span>
</div>
<!-- Text Content -->
<div class="text-center space-y-3 mb-10 max-w-xs">
<h1 class="text-2xl font-semibold text-gray-900 dark:text-white tracking-tight">Check your phone</h1>
<p class="text-gray-500 dark:text-gray-400 text-sm leading-relaxed font-light">
                    We’ve sent a 4-digit verification code to <br/>
<span class="font-medium text-gray-800 dark:text-gray-200">+1 (555) ***-8829</span>
</p>
</div>
<!-- PIN Input Area -->
<form class="w-full max-w-[280px] mb-8">
<div class="flex justify-between gap-3">
<input autofocus="" class="w-14 h-16 text-center text-2xl font-semibold bg-white dark:bg-surface-dark border border-gray-200 dark:border-gray-700 rounded-lg focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all shadow-sm caret-primary" inputmode="numeric" maxlength="1" type="text" value="4"/>
<input class="w-14 h-16 text-center text-2xl font-semibold bg-white dark:bg-surface-dark border border-primary dark:border-primary rounded-lg focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all shadow-sm caret-primary ring-2 ring-primary/10 shadow-lg shadow-primary/10" inputmode="numeric" maxlength="1" type="text"/>
<input class="w-14 h-16 text-center text-2xl font-semibold bg-white dark:bg-surface-dark border border-gray-200 dark:border-gray-700 rounded-lg focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all shadow-sm caret-primary" inputmode="numeric" maxlength="1" type="text"/>
<input class="w-14 h-16 text-center text-2xl font-semibold bg-white dark:bg-surface-dark border border-gray-200 dark:border-gray-700 rounded-lg focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all shadow-sm caret-primary" inputmode="numeric" maxlength="1" type="text"/>
</div>
</form>
<!-- Timer / Resend -->
<div class="text-center space-y-6">
<p class="text-sm font-medium text-gray-400 dark:text-gray-500">
                    Didn't receive code? 
                    <button class="block mt-1 mx-auto text-primary hover:text-primary-hover font-semibold transition-colors flex items-center justify-center gap-1.5">
<span class="material-icons-outlined text-base">refresh</span>
                        Resend code in 00:30
                    </button>
</p>
</div>
</div>
<!-- Sticky Bottom Action -->
<div class="pb-8 pt-4 w-full">
<button class="w-full bg-primary hover:bg-primary-hover text-white font-medium py-4 rounded-xl shadow-lg shadow-primary/20 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2 group">
<span>Verify Identity</span>
<span class="material-icons-outlined text-lg group-hover:translate-x-0.5 transition-transform">arrow_forward</span>
</button>
</div>
</main>
<!-- Simulated iOS Numeric Keyboard Area (Visual Placeholder for Design Context) -->
<div class="bg-gray-100 dark:bg-[#1c1c1e] pb-6 pt-2 border-t border-gray-200 dark:border-gray-700">
<div class="grid grid-cols-3 gap-y-4 text-center">
<button class="py-3 text-2xl font-normal text-gray-900 dark:text-white active:bg-gray-200 dark:active:bg-gray-700 rounded mx-1">1</button>
<button class="py-3 text-2xl font-normal text-gray-900 dark:text-white active:bg-gray-200 dark:active:bg-gray-700 rounded mx-1">2 <span class="block text-[10px] tracking-widest font-bold text-gray-900 dark:text-white mt-[-2px]">ABC</span></button>
<button class="py-3 text-2xl font-normal text-gray-900 dark:text-white active:bg-gray-200 dark:active:bg-gray-700 rounded mx-1">3 <span class="block text-[10px] tracking-widest font-bold text-gray-900 dark:text-white mt-[-2px]">DEF</span></button>
<button class="py-3 text-2xl font-normal text-gray-900 dark:text-white active:bg-gray-200 dark:active:bg-gray-700 rounded mx-1">4 <span class="block text-[10px] tracking-widest font-bold text-gray-900 dark:text-white mt-[-2px]">GHI</span></button>
<button class="py-3 text-2xl font-normal text-gray-900 dark:text-white active:bg-gray-200 dark:active:bg-gray-700 rounded mx-1">5 <span class="block text-[10px] tracking-widest font-bold text-gray-900 dark:text-white mt-[-2px]">JKL</span></button>
<button class="py-3 text-2xl font-normal text-gray-900 dark:text-white active:bg-gray-200 dark:active:bg-gray-700 rounded mx-1">6 <span class="block text-[10px] tracking-widest font-bold text-gray-900 dark:text-white mt-[-2px]">MNO</span></button>
<button class="py-3 text-2xl font-normal text-gray-900 dark:text-white active:bg-gray-200 dark:active:bg-gray-700 rounded mx-1">7 <span class="block text-[10px] tracking-widest font-bold text-gray-900 dark:text-white mt-[-2px]">PQRS</span></button>
<button class="py-3 text-2xl font-normal text-gray-900 dark:text-white active:bg-gray-200 dark:active:bg-gray-700 rounded mx-1">8 <span class="block text-[10px] tracking-widest font-bold text-gray-900 dark:text-white mt-[-2px]">TUV</span></button>
<button class="py-3 text-2xl font-normal text-gray-900 dark:text-white active:bg-gray-200 dark:active:bg-gray-700 rounded mx-1">9 <span class="block text-[10px] tracking-widest font-bold text-gray-900 dark:text-white mt-[-2px]">WXYZ</span></button>
<button class="py-3 text-2xl font-normal text-gray-900 dark:text-white active:bg-gray-200 dark:active:bg-gray-700 rounded mx-1 opacity-0 pointer-events-none">.</button>
<button class="py-3 text-2xl font-normal text-gray-900 dark:text-white active:bg-gray-200 dark:active:bg-gray-700 rounded mx-1">0</button>
<button class="py-3 flex items-center justify-center text-gray-900 dark:text-white active:bg-gray-200 dark:active:bg-gray-700 rounded mx-1">
<span class="material-icons-outlined">backspace</span>
</button>
</div>
</div>
</body></html>
