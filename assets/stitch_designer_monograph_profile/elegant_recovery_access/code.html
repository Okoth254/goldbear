<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Elegant Recovery Access</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Google Material Icons -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#b86614",
                        "background-light": "#f8f7f6",
                        "background-dark": "#211911",
                        "charcoal-bark": "#2c2c2c", 
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom styles to refine the luxury feel */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .dark .glass-panel {
            background: rgba(33, 25, 17, 0.7);
        }
        /* Custom input focus ring to match primary color without default blue */
        input:focus {
            --tw-ring-color: #b86614;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4 selection:bg-primary/20 selection:text-primary">
<!-- Phone Container Simulation -->
<div class="relative w-full max-w-sm mx-auto bg-white/50 dark:bg-background-dark/50 min-h-[800px] h-full rounded-[2.5rem] shadow-2xl overflow-hidden border border-primary/10 dark:border-primary/5 flex flex-col">
<!-- Status Bar Area (Decorative) -->
<div class="h-12 w-full flex justify-between items-center px-6 pt-2 select-none">
<span class="text-xs font-semibold text-charcoal-bark dark:text-white/80">9:41</span>
<div class="flex gap-1.5 items-center text-charcoal-bark dark:text-white/80">
<span class="material-icons text-[16px]">signal_cellular_alt</span>
<span class="material-icons text-[16px]">wifi</span>
<span class="material-icons text-[16px]">battery_full</span>
</div>
</div>
<!-- Decorative Background Element -->
<div class="absolute top-0 left-0 w-full h-[300px] bg-gradient-to-b from-primary/5 to-transparent pointer-events-none"></div>
<!-- Main Content Area -->
<div class="flex-1 flex flex-col px-8 pt-12 relative z-10">
<!-- Header / Logo Area -->
<div class="mb-16 text-center">
<!-- Abstract Logo Icon -->
<div class="w-12 h-12 mx-auto mb-6 bg-primary/10 rounded-full flex items-center justify-center">
<span class="material-icons text-primary text-2xl">chair</span>
</div>
<h2 class="text-3xl font-light text-charcoal-bark dark:text-white mb-2 tracking-tight">Access Recovery</h2>
<div class="w-16 h-1 bg-primary mx-auto rounded-full opacity-60"></div>
</div>
<!-- Instructions -->
<div class="mb-10 text-center">
<p class="text-sm leading-relaxed text-charcoal-bark/70 dark:text-white/60 font-normal">
                    Please enter the email address associated with your gallery account. We will send you a secure link to reset your credentials.
                </p>
</div>
<!-- Form -->
<form action="#" class="space-y-8 flex-1 flex flex-col" onsubmit="event.preventDefault()">
<!-- Email Input Group -->
<div class="group">
<label class="block text-xs font-medium text-charcoal-bark/60 dark:text-white/50 uppercase tracking-widest mb-3 ml-1" for="email">
                        Email Address
                    </label>
<div class="relative">
<input class="block w-full px-4 py-4 bg-white dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-xl text-charcoal-bark dark:text-white placeholder-gray-400 focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-300 outline-none text-base shadow-sm" id="email" name="email" placeholder="name@example.com" type="email"/>
<div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-primary/40">
<span class="material-icons text-lg">mail_outline</span>
</div>
</div>
</div>
<!-- Spacer -->
<div class="flex-grow"></div>
<!-- Action Area -->
<div class="space-y-6 pb-12">
<button class="w-full bg-charcoal-bark dark:bg-primary text-white dark:text-white font-medium py-4 px-6 rounded-xl hover:bg-primary dark:hover:bg-primary/90 transition-all duration-300 shadow-lg shadow-primary/20 active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
<span>Send Reset Link</span>
<span class="material-icons text-sm">arrow_forward</span>
</button>
<div class="text-center">
<a class="inline-flex items-center text-sm text-charcoal-bark/60 dark:text-white/60 hover:text-primary dark:hover:text-primary transition-colors duration-200 gap-1" href="#">
<span class="material-icons text-base">west</span>
<span>Return to Login</span>
</a>
</div>
</div>
</form>
</div>
<!-- Decorative Bottom Pattern -->
<div class="absolute bottom-0 left-0 w-full h-32 opacity-20 pointer-events-none overflow-hidden">
<div class="absolute -bottom-16 -right-16 w-64 h-64 bg-primary/20 rounded-full blur-3xl"></div>
</div>
</div>
</body></html>
